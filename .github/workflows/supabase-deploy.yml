name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Extract project ref from SUPABASE_URL
        id: project
        env:
          SB_URL: ${{ secrets.SUPABASE_URL }}
        shell: bash
        run: |
          REF="${SB_URL#https://}"
          REF="${REF%%.*}"
          if [ -z "$REF" ]; then
            echo "::error::Could not parse SUPABASE_URL secret"
            exit 1
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Project ref: $REF"

      - name: Push TikTok credentials to Supabase secrets
        shell: bash
        env:
          PROJECT_REF: ${{ steps.project.outputs.ref }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
        run: |
          supabase secrets set TIKTOK_CLIENT_KEY="$TIKTOK_CLIENT_KEY" \
            TIKTOK_CLIENT_SECRET="$TIKTOK_CLIENT_SECRET" \
            --project-ref "$PROJECT_REF"

      - name: Deploy each function
        shell: bash
        env:
          PROJECT_REF: ${{ steps.project.outputs.ref }}
        run: |
          set -e
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [ "$name" = "_shared" ]; then continue; fi
            echo "::group::Deploying $name"
            supabase functions deploy "$name" --project-ref "$PROJECT_REF" --no-verify-jwt
            echo "::endgroup::"
          done
