name: Deploy Supabase Functions

  on:
    push:
      branches: [main]
      paths:
        - 'supabase/functions/**'
        - '.github/workflows/supabase-deploy.yml'
    workflow_dispatch:

  jobs:
    deploy:
      runs-on: ubuntu-latest
      env:
        SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      steps:
        - uses: actions/checkout@v4

        - uses: supabase/setup-cli@v1
          with:
            version: latest

        - name: Extract project ref from SUPABASE_URL
          id: project
          env:
            SB_URL: ${{ secrets.SUPABASE_URL }}
          run: |
            REF="${SB_URL#https://}"
            REF="${REF%%.*}"
            if [ -z "$REF" ]; then
              echo "::error::Could not parse SUPABASE_URL secret"
              exit 1
            fi
            echo "ref=$REF" >> "$GITHUB_OUTPUT"
            echo "Project ref: $REF"

        - name: Deploy each function
          run: |
            set -e
            for fn in supabase/functions/*/; do
              name=$(basename "$fn")
              if [ "$name" = "_shared" ]; then continue; fi
              echo "::group::Deploying $name"
              supabase functions deploy "$name" \
                --project-ref ${{ steps.project.outputs.ref }} \
                --no-verify-jwt
              echo "::endgroup::"
            done
  